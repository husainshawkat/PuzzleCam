<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzle Cam — Panel de administración</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="brand admin-brand">PUZZLE·CAM <small>admin</small></div>
    <p class="login-copy">Inicia sesión con la cuenta de administrador creada en Supabase Authentication.</p>

    <form id="loginForm" class="login-form">
      <label class="field">
        <span>correo</span>
        <input type="email" name="email" autocomplete="username" required />
      </label>
      <label class="field">
        <span>contraseña</span>
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="primary-btn">entrar</button>
    </form>

    <a href="index.html" class="back-link">← volver a la cámara</a>
  </div>
</div>

<div id="dashboard" class="dashboard hidden">
  <header class="admin-top">
    <div class="brand admin-brand">PUZZLE·CAM <small>admin</small></div>
    <div class="admin-top-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button type="button" id="refreshBtn" class="ghost-btn">actualizar</button>
      <button type="button" id="logoutBtn" class="ghost-btn ghost-btn--danger">salir</button>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-stats">
      <span><strong id="totalCount">0</strong> capturas guardadas</span>
      <span class="live-dot" title="sincronización en tiempo real activa"></span>
    </div>

    <div id="emptyState" class="admin-empty">
      Todavía no hay rompecabezas completados.<br/>
      Aparecerán aquí en cuanto alguien cierre el puño sobre uno resuelto.
    </div>

    <div id="photoGrid" class="photo-grid"></div>
  </main>
</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
