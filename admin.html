<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzle Cam — Admin Panel</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="brand admin-brand">PUZZLE·CAM <small>admin</small></div>
    <p class="login-copy">Sign in with the admin account created in Supabase Authentication.</p>

    <form id="loginForm" class="login-form">
      <label class="field">
        <span>email</span>
        <input type="email" name="email" autocomplete="username" required />
      </label>
      <label class="field">
        <span>password</span>
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="primary-btn">log in</button>
    </form>

    <a href="index.html" class="back-link">← back to camera</a>
  </div>
</div>

<div id="dashboard" class="dashboard hidden">
  <header class="admin-top">
    <div class="brand admin-brand">PUZZLE·CAM <small>admin</small></div>
    <div class="admin-top-right">
      <span class="admin-email" id="adminEmailLabel"></span>
      <button type="button" id="refreshBtn" class="ghost-btn">refresh</button>
      <button type="button" id="logoutBtn" class="ghost-btn ghost-btn--danger">log out</button>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-stats">
      <span><strong id="totalCount">0</strong> captures saved</span>
      <span class="live-dot" title="real-time sync active"></span>
    </div>

    <div id="emptyState" class="admin-empty">
      No completed puzzles yet.<br/>
      They will appear here as soon as someone closes their fist on a solved one.
    </div>

    <div id="photoGrid" class="photo-grid"></div>
  </main>
</div>

<script type="module" src="./js/admin.js"></script>
</body>
</html>
