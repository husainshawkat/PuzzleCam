<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Puzzle Cam — Gesture Capture</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div id="app">

  <div id="stage">
    <video id="webcam" playsinline autoplay muted></video>
    <canvas id="sceneCanvas"></canvas>

    <nav class="hud-top">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        PUZZLE·CAM <small>hand-frame capture</small>
      </div>

      <div class="round-indicator" id="roundIndicator">
        <span class="round-dots">
          <span class="round-dot"></span>
          <span class="round-dot"></span>
          <span class="round-dot"></span>
        </span>
        <span class="round-label" id="roundLabel">puzzle 1 / 3</span>
      </div>

      <div class="hud-top-right">
        <div class="status-pill">
          <svg class="camera-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 8.5C4 7.67 4.67 7 5.5 7H7.5L8.5 5.5H15.5L16.5 7H18.5C19.33 7 20 7.67 20 8.5V17.5C20 18.33 19.33 19 18.5 19H5.5C4.67 19 4 18.33 4 17.5V8.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="3.25" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">starting camera…</span>
        </div>
        <a href="admin.html" class="menu-icon-btn" title="Admin panel" aria-label="Admin panel">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="8" r="3.25" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 19.5C5.8 16.2 8.4 14.5 12 14.5C15.6 14.5 18.2 16.2 19 19.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </a>
      </div>
    </nav>

    <div id="progressBadge" class="progress-badge">
      <span id="progressText">0 / 9 pieces placed</span>
    </div>

    <div id="cloudSyncBadge" class="cloud-sync-badge"></div>

    <div id="roundToast" class="round-toast">
      <div class="round-toast-title" id="roundToastTitle">puzzle 1 complete!</div>
      <div class="round-toast-sub" id="roundToastSub">get ready for the next puzzle…</div>
    </div>

    <div id="loadingOverlay">
      <div class="loader-camera" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 8.5C4 7.67 4.67 7 5.5 7H7.5L8.5 5.5H15.5L16.5 7H18.5C19.33 7 20 7.67 20 8.5V17.5C20 18.33 19.33 19 18.5 19H5.5C4.67 19 4 18.33 4 17.5V8.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          <circle cx="12" cy="13" r="3.1" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </div>
      <div class="loader-text" id="loaderText">loading HandLandmarker model…</div>
      <div class="loader-bar"></div>
      <button type="button" id="loaderRetry" class="loader-retry hidden">retry</button>
    </div>

    <div id="errorBanner"></div>
  </div>

  <aside id="gallery">
    <div class="gallery-head">
      <span class="gallery-title">Strip</span>
      <span class="gallery-count" id="galleryCount">0 / 3</span>
    </div>

    <div class="strip-complete-msg" id="stripCompleteMsg">
      strip complete — download or reset to keep going
    </div>

    <div id="galleryStrip" class="gallery-strip">
      <div class="gallery-empty" id="galleryEmpty">
        Your completed puzzles<br/>will appear here.
      </div>
    </div>

    <div class="gallery-actions">
      <button type="button" id="downloadStripBtn" class="gallery-action-btn" disabled>download strip</button>
      <button type="button" id="resetAllBtn" class="gallery-action-btn gallery-action-btn--danger">reset all</button>
      <a href="admin.html" class="gallery-link">admin panel →</a>
    </div>
  </aside>

</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
